name: ClaudeUsage
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: .
        includes:
          - "*.swift"
      - path: AppIcon.icns
    info:
      path: Generated/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.3.0"
        CFBundleVersion: "3"
        NSHumanReadableCopyright: "Personal use"
        LSMinimumSystemVersion: "14.0"
        CFBundleIconFile: AppIcon
    settings:
      base:
        # Change this (and the matching service in SessionStore.swift) to a
        # bundle ID you own, e.g. com.yourname.claudeusage.
        PRODUCT_BUNDLE_IDENTIFIER: com.example.claudeusage
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "3"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEAD_CODE_STRIPPING: YES
        GENERATE_INFOPLIST_FILE: NO
